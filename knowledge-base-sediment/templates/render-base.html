<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KB :: {{TAG}}</title>
  <style>
    /* ─── Library / paper-and-ink palette ─────────────────────────── */
    :root {
      --paper:        #faf6ef;
      --paper-card:   #ffffff;
      --ink:          #1f1d1a;
      --ink-soft:     #5a554d;
      --rule:         #d8d2c4;
      --accent:       #7a3b14;     /* old-book leather */
      --accent-soft:  #d8b596;
      --code-bg:      #f3efe6;
      --highlight:    #fff5d6;
      --shadow:       0 1px 2px rgba(31,29,26,0.05), 0 4px 14px rgba(31,29,26,0.06);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5em 1.4em 5em;
      line-height: 1.65;
      color: var(--ink);
      background: var(--paper);
    }
    h1, h2, h3 { font-family: Georgia, "Iowan Old Style", "Times New Roman", "Source Han Serif SC", serif; line-height: 1.3; }
    h1 { font-size: 1.85em; margin: 0 0 .4em; letter-spacing: .01em; }
    h2 { font-size: 1.35em; margin-top: 1.6em; border-bottom: 1px solid var(--rule); padding-bottom: .25em; }
    h3 { font-size: 1.1em; }
    a { color: var(--accent); text-decoration: none; border-bottom: 1px dotted var(--accent-soft); }
    a:hover { color: var(--ink); border-bottom-color: var(--ink); }
    p, ul, ol, table { margin: .8em 0; }

    /* ─── Library catalog (index.html) ────────────────────────────── */
    .library h1 { font-size: 2.2em; }
    .lib-meta {
      font-size: .9em;
      color: var(--ink-soft);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin: -.2em 0 2em;
    }
    .library-entry {
      display: block;
      background: var(--paper-card);
      border: 1px solid var(--rule);
      border-left: 4px solid var(--accent);
      border-radius: 4px;
      padding: 1.1em 1.4em;
      margin: 0 0 1em;
      box-shadow: var(--shadow);
      transition: transform .12s ease, box-shadow .12s ease, border-left-color .12s ease;
      color: var(--ink);
    }
    .library-entry:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 4px rgba(31,29,26,0.08), 0 8px 22px rgba(31,29,26,0.10);
      border-left-color: var(--ink);
    }
    .library-entry h3 { margin: 0 0 .25em; color: var(--ink); font-size: 1.2em; }
    .library-entry .count { color: var(--ink-soft); font-weight: normal; font-size: .85em; }
    .library-entry .blurb { margin: 0 0 .4em; color: var(--ink); }
    .library-entry .meta { font-size: .78em; color: var(--ink-soft); letter-spacing: .03em; }

    /* ─── Per-tag page ────────────────────────────────────────────── */
    .library-back {
      margin-bottom: 1.5em;
      font-size: .9em;
    }
    .library-back a {
      border-bottom: none;
      color: var(--ink-soft);
    }
    .library-back a:hover { color: var(--accent); }

    /* ─── Card ────────────────────────────────────────────────────── */
    .card {
      background: var(--paper-card);
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 1.2em 1.6em 1.4em;
      margin: 1.2em 0 1.8em;
      box-shadow: var(--shadow);
    }
    .card h2 { margin-top: 0; border-bottom: 2px solid var(--ink); padding-bottom: .3em; }
    .card .meta {
      color: var(--ink-soft);
      font-size: .82em;
      margin-bottom: 1em;
      padding-bottom: .6em;
      border-bottom: 1px dashed var(--rule);
    }
    .tag {
      display: inline-block;
      background: var(--accent);
      color: var(--paper);
      padding: .05em .55em;
      border-radius: 2px;
      margin-right: .25em;
      font-size: .75em;
      letter-spacing: .03em;
      text-transform: uppercase;
    }

    /* ─── Primer (tag README) ─────────────────────────────────────── */
    .primer {
      background: var(--paper-card);
      border: 1px solid var(--accent-soft);
      border-radius: 4px;
      padding: 1.4em 1.8em 1.6em;
      margin: 0 0 2.2em;
      position: relative;
    }
    .primer::before {
      content: "导览 · primer";
      position: absolute;
      top: -.7em;
      left: 1.4em;
      background: var(--paper);
      padding: 0 .5em;
      color: var(--accent);
      font-size: .75em;
      letter-spacing: .15em;
      text-transform: uppercase;
    }
    .primer h1 { font-size: 1.5em; margin-top: .2em; }
    .primer table { width: 100%; border-collapse: collapse; }
    .primer th, .primer td { text-align: left; padding: .35em .6em; border-bottom: 1px solid var(--rule); font-size: .92em; }
    .primer th { color: var(--ink-soft); font-weight: normal; }

    /* ─── Code & pre ──────────────────────────────────────────────── */
    pre {
      background: var(--code-bg);
      padding: .8em 1.1em;
      overflow-x: auto;
      border-radius: 3px;
      font-size: .87em;
      line-height: 1.55;
    }
    code { font-family: "SF Mono", "JetBrains Mono", Consolas, monospace; font-size: .92em; }
    p code, li code { background: var(--code-bg); padding: 0 .3em; border-radius: 2px; }

    /* ─── Mermaid block ───────────────────────────────────────────── */
    pre.mermaid {
      background: var(--paper-card);
      border: 1px solid var(--rule);
      padding: 1.2em;
      text-align: center;
      box-shadow: var(--shadow);
    }

    /* ─── Tables ──────────────────────────────────────────────────── */
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: .45em .7em; border-bottom: 1px solid var(--rule); font-size: .92em; vertical-align: top; }
    th { background: var(--code-bg); font-weight: 600; }

    /* ─── Blockquote ──────────────────────────────────────────────── */
    blockquote {
      border-left: 3px solid var(--accent-soft);
      margin: 1em 0;
      padding: .3em 1em;
      color: var(--ink-soft);
      font-style: italic;
    }

    /* ─── TOC sidebar (per-tag pages) ─────────────────────────────── */
    nav#toc {
      position: fixed;
      top: 0;
      right: 0;
      width: 240px;
      max-height: 100vh;
      overflow-y: auto;
      padding: 1.2em 1em;
      border-left: 1px solid var(--rule);
      background: var(--paper);
      font-size: .85em;
    }
    nav#toc::before {
      content: "目录 · contents";
      display: block;
      color: var(--accent);
      letter-spacing: .15em;
      font-size: .8em;
      text-transform: uppercase;
      margin-bottom: .6em;
    }
    nav#toc a {
      display: block;
      padding: .25em 0;
      color: var(--ink-soft);
      border-bottom: none;
    }
    nav#toc a:hover { color: var(--accent); }

    /* shift page content away from TOC */
    body:has(nav#toc:not(:empty)) main { padding-right: 260px; }
    @media (max-width: 900px) {
      nav#toc { display: none; }
      body main { padding-right: 0; }
    }
  </style>
</head>
<body>
  <nav id="toc">{{TOC}}</nav>
  <main>
    {{CARDS}}
  </main>
</body>
</html>
